name: CI Access Management API

on:
  push:

defaults:
  run:
    working-directory: ./access_management

jobs:
  test_access_management:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run Black
        run: |
          black --check .

      - name: Run Flake8
        run: |
          flake8 .

      - name: Run tests
        run: |
          pytest --cov-fail-under=80